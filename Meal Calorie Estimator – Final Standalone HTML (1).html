<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Calorie Est."/>
  <title>Calorie Estimator</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f172a;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:24px 16px 48px}
    .wrap{max-width:480px;margin:0 auto}
    h1{font-size:22px;font-weight:700}
    .sub{color:#94a3b8;font-size:13px;margin-top:4px;margin-bottom:20px}
    .row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
    /* API box */
    .api-box{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px;margin-bottom:20px}
    .api-box label{font-size:12px;color:#94a3b8;display:block;margin-bottom:6px}
    .api-box input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;font-size:13px;padding:9px 12px;outline:none;font-family:monospace}
    .api-box .hint{font-size:11px;color:#64748b;margin-top:5px}
    .api-box a{color:#60a5fa}
    /* Tabs */
    .tabs{display:flex;gap:6px;margin-bottom:14px}
    .tab{flex:1;padding:10px 4px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
    .tab.on{background:#f97316;border-color:#f97316;color:#fff}
    /* Inputs */
    .panel{display:none}.panel.on{display:block}
    textarea,input[type=url],input[type=text],input[type=number]{width:100%;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#f1f5f9;font-size:15px;padding:12px 14px;outline:none;font-family:inherit;box-sizing:border-box}
    textarea{resize:none}
    ::placeholder{color:#64748b}
    .upload{border:2px dashed #334155;border-radius:10px;padding:24px;text-align:center;position:relative;cursor:pointer}
    .upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-icon{font-size:32px;margin-bottom:8px}
    .upload-hint{color:#94a3b8;font-size:13px}
    .preview{max-width:100%;border-radius:8px;margin-top:10px;max-height:200px;object-fit:cover;display:none}
    .portion{display:flex;gap:8px;margin-top:10px;align-items:center}
    .portion label{color:#94a3b8;font-size:13px;white-space:nowrap}
    .portion input{flex:1;border-radius:8px;font-size:14px;padding:10px 12px}
    /* Buttons */
    .btn{margin-top:10px;width:100%;background:#f97316;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s}
    .btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}
    .btn-ghost{background:none;border:1px solid #334155;border-radius:10px;color:#94a3b8;padding:12px;font-size:14px;cursor:pointer;width:100%;margin-top:8px}
    .btn-sm{background:none;border:none;color:#94a3b8;font-size:12px;cursor:pointer;text-decoration:underline}
    .btn-icon{background:#1e293b;border:1px solid #334155;border-radius:8px;color:#94a3b8;padding:8px 12px;font-size:13px;cursor:pointer}
    .err{color:#f87171;font-size:12px;margin-top:6px}
    /* Summary */
    .card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin:20px 0}
    .sum-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .sum-title{font-weight:700;font-size:15px}
    .cal-total{font-size:22px;font-weight:800;color:#f97316}
    .cal-goal{font-size:12px;color:#94a3b8}
    .bar-row{margin-bottom:8px}
    .bar-labels{display:flex;justify-content:space-between;margin-bottom:3px}
    .bar-labels span:first-child{color:#94a3b8;font-size:12px}
    .bar-labels span:last-child{color:#f1f5f9;font-size:12px;font-weight:600}
    .bar-labels span.over{color:#f87171}
    .bar-track{background:#334155;border-radius:4px;height:6px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
    .sum-foot{display:flex;justify-content:space-between;margin-top:12px;align-items:center}
    /* Meal cards */
    .sec-label{color:#94a3b8;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
    .meal-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer}
    .meal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
    .meal-name{font-weight:600;font-size:14px}
    .meal-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;display:inline-block;margin-top:4px}
    .meal-note{color:#94a3b8;font-size:11px;margin-top:4px}
    .meal-kcal{color:#f97316;font-weight:700;font-size:18px;white-space:nowrap;margin-left:12px}
    .meal-kcal span{font-size:12px;font-weight:400}
    .meal-macros{display:flex;gap:12px}
    .macro-val{font-size:13px;font-weight:700}
    .macro-name{font-size:11px;color:#94a3b8}
    .meal-expand{margin-top:10px;padding-top:10px;border-top:1px solid #334155;display:grid;grid-template-columns:1fr 1fr;gap:4px 16px}
    .exp-item span:first-child{font-size:12px;font-weight:600}
    .exp-item span:last-child{font-size:11px;color:#94a3b8}
    .toggle-hint{color:#94a3b8;font-size:11px;text-align:right;margin-top:2px}
    /* Empty */
    .empty{text-align:center;color:#94a3b8;margin-top:48px;font-size:14px}
    .empty-icon{font-size:40px;margin-bottom:12px}
    /* Settings screen */
    .settings-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
    .back-btn{background:none;border:none;color:#94a3b8;font-size:22px;cursor:pointer;padding:0}
    .settings-field{margin-bottom:16px}
    .settings-field label{color:#94a3b8;font-size:13px;display:block;margin-bottom:6px}
    .settings-field input{border-radius:8px;font-size:15px;padding:10px 14px}
  </style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const NUTRIENTS = [
  {key:'calories',  label:'Calories',     unit:'kcal', color:'#f97316', def:2000},
  {key:'protein_g', label:'Protein',      unit:'g',    color:'#22c55e', def:150},
  {key:'carbs_g',   label:'Carbs',        unit:'g',    color:'#60a5fa', def:250},
  {key:'fat_g',     label:'Fat',          unit:'g',    color:'#facc15', def:80},
  {key:'fibre_g',   label:'Fibre',        unit:'g',    color:'#a78bfa', def:30},
  {key:'sugar_g',   label:'Sugar',        unit:'g',    color:'#f472b6', def:50},
  {key:'sat_fat_g', label:'Sat. Fat',     unit:'g',    color:'#fb923c', def:20},
  {key:'sodium_mg', label:'Sodium',       unit:'mg',   color:'#94a3b8', def:2300},
  {key:'calcium_mg',label:'Calcium',      unit:'mg',   color:'#67e8f9', def:1000},
];

const TYPE_META = {
  text:        {label:'✏️ Text',         bg:'#1d3a5f', col:'#60a5fa', notion:'Text'},
  label:       {label:'📦 Label',        bg:'#1a3a1a', col:'#4ade80', notion:'Label'},
  recipePhoto: {label:'📖 Recipe photo', bg:'#3a1a3a', col:'#c084fc', notion:'Recipe Photo'},
  url:         {label:'🔗 Recipe URL',   bg:'#3a2a0a', col:'#fbbf24', notion:'Recipe URL'},
};

const SYSTEM = {
  text:`You are a nutrition expert. Estimate nutritional content from the user's meal description.
Respond ONLY with valid JSON, no markdown or backticks:
{"meal_label":"Short label max 6 words","calories":450,"protein_g":25,"carbs_g":40,"fat_g":15,"fibre_g":6,"sugar_g":8,"sat_fat_g":4,"sodium_mg":320,"calcium_mg":80,"note":"Key assumptions"}
Use average Australian/Western portions unless specified.`,
  label:`You are a nutrition expert. Read the nutrition label in the photo and extract values.
Respond ONLY with valid JSON, no markdown or backticks:
{"meal_label":"Product name","calories":450,"protein_g":25,"carbs_g":40,"fat_g":15,"fibre_g":6,"sugar_g":8,"sat_fat_g":4,"sodium_mg":320,"calcium_mg":80,"note":"Values read from label per serving"}`,
  recipePhoto:`You are a nutrition expert. Read the recipe in the photo and estimate nutrition for the whole dish, then apply the portion specified.
Respond ONLY with valid JSON, no markdown or backticks:
{"meal_label":"Recipe name max 6 words","calories":450,"protein_g":25,"carbs_g":40,"fat_g":15,"fibre_g":6,"sugar_g":8,"sat_fat_g":4,"sodium_mg":320,"calcium_mg":80,"note":"Whole recipe estimated, portion applied"}`,
  url:`You are a nutrition expert. Estimate nutrition for the whole recipe from the content provided, then apply the portion specified.
Respond ONLY with valid JSON, no markdown or backticks:
{"meal_label":"Recipe name max 6 words","calories":450,"protein_g":25,"carbs_g":40,"fat_g":15,"fibre_g":6,"sugar_g":8,"sat_fat_g":4,"sodium_mg":320,"calcium_mg":80,"note":"Whole recipe estimated, portion applied"}`
};

// State
let screen = 'main'; // main | settings
let activeTab = 'text';
let meals = [];
let targets = {};
let expandedCards = new Set();
let labelFile = null, recipeFile = null;
let loading = false;

const today = () => new Date().toISOString().slice(0,10);

function loadState() {
  const k = localStorage.getItem('apiKey_meal');
  if(k) document.getElementById && (window._apiKey = k);
  const saved = localStorage.getItem('meals:' + today());
  meals = saved ? JSON.parse(saved) : [];
  const t = localStorage.getItem('nutrient_targets');
  targets = t ? JSON.parse(t) : Object.fromEntries(NUTRIENTS.map(n=>[n.key,n.def]));
}

function saveTargets() { localStorage.setItem('nutrient_targets', JSON.stringify(targets)); }
function saveMeals() { localStorage.setItem('meals:' + today(), JSON.stringify(meals)); }

function totals() {
  return meals.reduce((a,m) => {
    NUTRIENTS.forEach(n => a[n.key] = (a[n.key]||0) + (m[n.key]||0));
    return a;
  }, {});
}

function imgToBase64(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result.split(',')[1]);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

async function fetchRecipeText(url) {
  const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
  const res = await fetch(proxy);
  const data = await res.json();
  return data.contents.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,3000);
}

async function analyse() {
  const apiKey = localStorage.getItem('apiKey_meal');
  if(!apiKey) { showError('Please enter your API key first.'); return; }
  if(loading) return;
  loading = true;
  setBtn('Analysing…', true);
  clearError();

  try {
    let messages, system, type;

    if(activeTab === 'text') {
      const txt = document.getElementById('textInput').value.trim();
      if(!txt) throw new Error('Please describe your meal.');
      type = 'text'; system = SYSTEM.text;
      messages = [{role:'user', content: txt}];

    } else if(activeTab === 'label') {
      if(!labelFile) throw new Error('Please select a photo of the nutrition label.');
      setBtn('Reading label…', true);
      type = 'label'; system = SYSTEM.label;
      const b64 = await imgToBase64(labelFile);
      messages = [{role:'user', content:[
        {type:'image', source:{type:'base64', media_type:labelFile.type, data:b64}},
        {type:'text', text:'Read the nutrition information from this label.'}
      ]}];

    } else if(activeTab === 'recipePhoto') {
      if(!recipeFile) throw new Error('Please select a photo of the recipe.');
      setBtn('Reading recipe…', true);
      type = 'recipePhoto'; system = SYSTEM.recipePhoto;
      const b64 = await imgToBase64(recipeFile);
      const portion = document.getElementById('recipePhotoPortion').value.trim() || 'one serving';
      messages = [{role:'user', content:[
        {type:'image', source:{type:'base64', media_type:recipeFile.type, data:b64}},
        {type:'text', text:`Read this recipe and estimate nutrition for the whole dish. I had ${portion} of it.`}
      ]}];

    } else {
      const url = document.getElementById('urlInput').value.trim();
      if(!url) throw new Error('Please enter a recipe URL.');
      setBtn('Fetching recipe…', true);
      type = 'url'; system = SYSTEM.url;
      const portion = document.getElementById('urlPortion').value.trim() || 'one serving';
      const recipeText = await fetchRecipeText(url);
      setBtn('Analysing recipe…', true);
      messages = [{role:'user', content:`Recipe content:\n\n${recipeText}\n\nEstimate nutrition for the whole recipe. I had ${portion} of it.`}];
    }

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-allow-browser':'true'
      },
      body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:1000, system, messages})
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    const raw = data.content?.find(b=>b.type==='text')?.text || '';
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    parsed._type = type;
    meals.unshift(parsed);
    saveMeals();

    // Clear inputs
    if(activeTab==='text') document.getElementById('textInput').value = '';
    if(activeTab==='url') { document.getElementById('urlInput').value=''; document.getElementById('urlPortion').value=''; }

    render();
  } catch(e) {
    showError(e.message || 'Something went wrong. Try again.');
  } finally {
    loading = false;
    setBtn('Estimate Calories', false);
  }
}

function setBtn(txt, disabled) {
  const b = document.getElementById('analyseBtn');
  if(b) { b.textContent = txt; b.disabled = disabled; }
}
function showError(msg) { const e = document.getElementById('errMsg'); if(e) e.textContent = msg; }
function clearError() { const e = document.getElementById('errMsg'); if(e) e.textContent = ''; }

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('on', ['text','label','recipePhoto','url'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  const p = document.getElementById('panel-' + tab);
  if(p) p.classList.add('on');
  clearError();
}

function toggleCard(i) {
  if(expandedCards.has(i)) expandedCards.delete(i);
  else expandedCards.add(i);
  renderMeals();
}

function renderBar(label, value, target, color, unit) {
  const pct = Math.min((value/target)*100, 100);
  const over = value > target;
  return `<div class="bar-row">
    <div class="bar-labels">
      <span>${label}</span>
      <span class="${over?'over':''}">${value}${unit} <span style="color:#64748b;font-weight:400">/ ${target}${unit}</span></span>
    </div>
    <div class="bar-track"><div class="bar-fill" style="background:${over?'#f87171':color};width:${pct}%"></div></div>
  </div>`;
}

function renderMeals() {
  const t = totals();
  const hasMeals = meals.length > 0;

  // Summary
  const sumEl = document.getElementById('summary');
  const emptyEl = document.getElementById('emptyState');
  if(sumEl) sumEl.style.display = hasMeals ? 'block' : 'none';
  if(emptyEl) emptyEl.style.display = hasMeals ? 'none' : 'block';

  if(hasMeals && sumEl) {
    sumEl.innerHTML = `
      <div class="sum-head">
        <span class="sum-title">Today's Total</span>
        <div style="text-align:right">
          <span class="cal-total">${t.calories}</span>
          <span class="cal-goal"> / ${targets.calories} kcal</span>
        </div>
      </div>
      ${NUTRIENTS.slice(1).map(n => renderBar(n.label, t[n.key]||0, targets[n.key], n.color, n.unit)).join('')}
      <div class="sum-foot">
        <span style="color:#94a3b8;font-size:12px">${meals.length} meal${meals.length!==1?'s':''} logged</span>
        <button class="btn-sm" onclick="clearDay()">Clear day</button>
      </div>`;
  }

  // Meal cards
  const logEl = document.getElementById('mealLog');
  if(!logEl) return;
  if(!hasMeals) { logEl.innerHTML = ''; return; }
  logEl.innerHTML = '<div class="sec-label">Meals logged · tap to expand</div>' +
    meals.map((m,i) => {
      const tm = TYPE_META[m._type||'text'];
      const exp = expandedCards.has(i);
      return `<div class="meal-card" onclick="toggleCard(${i})">
        <div class="meal-top">
          <div style="flex:1">
            <div class="meal-name">${m.meal_label}</div>
            <span class="meal-badge" style="background:${tm.bg};color:${tm.col}">${tm.label}</span>
            ${m.note?`<div class="meal-note">${m.note}</div>`:''}
          </div>
          <div style="text-align:right;margin-left:12px">
            <div class="meal-kcal">${m.calories} <span>kcal</span></div>
            <div class="toggle-hint">${exp?'▲':'▼'}</div>
          </div>
        </div>
        <div class="meal-macros">
          <div><div class="macro-val" style="color:#22c55e">${m.protein_g}g</div><div class="macro-name">Protein</div></div>
          <div><div class="macro-val" style="color:#60a5fa">${m.carbs_g}g</div><div class="macro-name">Carbs</div></div>
          <div><div class="macro-val" style="color:#facc15">${m.fat_g}g</div><div class="macro-name">Fat</div></div>
        </div>
        ${exp ? `<div class="meal-expand">
          <div class="exp-item"><span style="color:#a78bfa">${m.fibre_g||0}g</span> <span>Fibre</span></div>
          <div class="exp-item"><span style="color:#f472b6">${m.sugar_g||0}g</span> <span>Sugar</span></div>
          <div class="exp-item"><span style="color:#fb923c">${m.sat_fat_g||0}g</span> <span>Sat. Fat</span></div>
          <div class="exp-item"><span style="color:#94a3b8">${m.sodium_mg||0}mg</span> <span>Sodium</span></div>
          <div class="exp-item"><span style="color:#67e8f9">${m.calcium_mg||0}mg</span> <span>Calcium</span></div>
        </div>` : ''}
      </div>`;
    }).join('');
}

function clearDay() {
  if(!confirm('Clear all meals for today?')) return;
  meals = []; expandedCards.clear(); saveMeals(); renderMeals();
}

function render() {
  const app = document.getElementById('app');
  if(screen === 'settings') {
    app.innerHTML = `
      <div class="settings-header">
        <button class="back-btn" onclick="screen='main';render()">←</button>
        <h1 style="font-size:20px;font-weight:700">Daily Targets</h1>
      </div>
      ${NUTRIENTS.map(n=>`
        <div class="settings-field">
          <label>${n.label} (${n.unit})</label>
          <input type="number" value="${targets[n.key]}" onchange="targets['${n.key}']=Number(this.value);saveTargets()"/>
        </div>`).join('')}
      <button class="btn-ghost" onclick="targets=Object.fromEntries(${JSON.stringify(NUTRIENTS)}.map(n=>[n.key,n.def]));saveTargets();render()">Reset to defaults</button>`;
    return;
  }

  app.innerHTML = `
    <div class="row">
      <div>
        <h1>🍽️ Calorie Estimator</h1>
        <p class="sub">Text, photo, or recipe — AI does the rest</p>
      </div>
      <button class="btn-icon" onclick="screen='settings';render()">⚙️ Targets</button>
    </div>

    <div class="api-box">
      <label>Anthropic API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-..." value="${localStorage.getItem('apiKey_meal')||''}"
        oninput="localStorage.setItem('apiKey_meal',this.value)"/>
      <p class="hint">Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>. Stored on your device only.</p>
    </div>

    <div class="tabs">
      ${['text','label','recipePhoto','url'].map((t,i)=>`
        <div class="tab${activeTab===t?' on':''}" onclick="switchTab('${t}')">
          ${['✏️ Text','📦 Label','📖 Recipe','🔗 URL'][i]}
        </div>`).join('')}
    </div>

    <div id="panel-text" class="panel${activeTab==='text'?' on':''}">
      <textarea id="textInput" rows="3" placeholder="e.g. two scrambled eggs, sourdough toast with butter and a flat white"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();analyse()}"></textarea>
    </div>

    <div id="panel-label" class="panel${activeTab==='label'?' on':''}">
      <div class="upload" onclick="document.getElementById('labelFile').click()">
        <input type="file" id="labelFile" accept="image/*" capture="environment" onchange="handleFile(this,'labelFile','labelPreview')"/>
        <div id="labelPreview-wrap"><div class="upload-icon">📦</div><div class="upload-hint">Tap to photo a nutrition label</div></div>
        <img id="labelPreview" class="preview"/>
      </div>
    </div>

    <div id="panel-recipePhoto" class="panel${activeTab==='recipePhoto'?' on':''}">
      <div class="upload" onclick="document.getElementById('recipeFile').click()">
        <input type="file" id="recipeFile" accept="image/*" capture="environment" onchange="handleFile(this,'recipeFile','recipePreview')"/>
        <div id="recipePreview-wrap"><div class="upload-icon">📖</div><div class="upload-hint">Tap to photo a recipe (book, card, screen)</div></div>
        <img id="recipePreview" class="preview"/>
      </div>
      <div class="portion">
        <label>I had</label>
        <input type="text" id="recipePhotoPortion" placeholder="e.g. a quarter, half, 2 servings"/>
      </div>
    </div>

    <div id="panel-url" class="panel${activeTab==='url'?' on':''}">
      <input type="url" id="urlInput" placeholder="https://..."/>
      <div class="portion">
        <label>I had</label>
        <input type="text" id="urlPortion" placeholder="e.g. a quarter, half, 2 servings"/>
      </div>
    </div>

    <div class="err" id="errMsg"></div>
    <button class="btn" id="analyseBtn" onclick="analyse()">Estimate Calories</button>

    <div class="card" id="summary" style="display:none"></div>
    <div id="mealLog"></div>
    <div class="empty" id="emptyState" style="display:none">
      <div class="empty-icon">🥗</div>
      <div>Log your first meal above</div>
    </div>`;

  renderMeals();
}

function handleFile(input, fileVar, previewId) {
  const f = input.files[0]; if(!f) return;
  if(fileVar==='labelFile') labelFile = f;
  if(fileVar==='recipeFile') recipeFile = f;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById(previewId);
    const wrap = document.getElementById(previewId+'-wrap');
    if(img){ img.src = e.target.result; img.style.display='block'; }
    if(wrap) wrap.style.display='none';
  };
  reader.readAsDataURL(f);
}

loadState();
render();
if(meals.length===0) document.getElementById('emptyState').style.display='block';
</script>
